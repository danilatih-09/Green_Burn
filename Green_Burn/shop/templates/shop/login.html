{% extends 'shop/base.html' %}
{% block title %}Вход | GREEN Burn{% endblock %}

{% block content %}

<div class="checkout-box">
    <h1>Вход</h1>

    {% if form.non_field_errors %}
        <p class="checkout-message" style="border-color: var(--danger);">
            Неверный логин или пароль
        </p>
    {% endif %}

    <form method="post" class="checkout-form">
        {% csrf_token %}

        {% for field in form %}
            <label for="{{ field.id_for_label }}">{{ field.label }}</label>
            {{ field }}
        {% endfor %}

        <button type="submit" class="btn">Войти</button>
    </form>

    <p style="margin-top: 20px; color: var(--text-secondary); font-size: 14px;">
        Нет аккаунта? <a href="{% url 'register' %}" style="color: var(--accent);">Зарегистрироваться</a>
    </p>
</div>

{% endblock %}
