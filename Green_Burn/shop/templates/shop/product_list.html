{% extends 'shop/base.html' %}
{% block title %}Каталог | GREEN Burn{% endblock %}

{% block content %}

<style>
.page-header {
    text-align: center;
    margin-bottom: 80px;
}

.page-header h1 {
    font-size: 60px;
    font-weight: 900;
}

.filters {
    margin-bottom: 60px;
}

.filters form {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
}

.filter-group select,
.filter-group input {
    padding: 14px 18px;
    background: var(--bg-secondary);
    border: 1px solid #222;
    color: var(--text-main);
    border-radius: 12px;
}

.product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 40px;
}

.product-card {
    background: var(--bg-secondary);
    border-radius: 24px;
    overflow: hidden;
    transition: 0.4s;
}

.product-card:hover {
    transform: translateY(-10px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}

.product-image {
    height: 320px;
    object-fit: contain;
    background: #111;
}

.product-info {
    padding: 30px;
}

.product-name {
    font-size: 20px;
    margin-bottom: 12px;
}

.product-price {
    font-size: 22px;
    color: var(--accent);
    margin-bottom: 20px;
}

.product-actions {
    display: flex;
    gap: 10px;
}
</style>

<div class="page-header">
    <h1>Каталог</h1>
</div>

<div class="filters">
    <form method="get">
        <div class="filter-group">
            <select name="category">
                <option value="">Все категории</option>
                {% for cat in categories %}
                <option value="{{ cat.id }}">{{ cat.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="filter-group">
            <input type="text" name="search" placeholder="Поиск...">
        </div>

        <button class="btn">Применить</button>
    </form>
</div>

<div class="product-grid">
    {% for product in products %}
    <div class="product-card">
        {% if product.photo %}
        <img src="{{ product.photo.url }}" class="product-image">
        {% else %}
        <div class="product-image"></div>
        {% endif %}

        <div class="product-info">
            <div class="product-name">{{ product.name }}</div>
            <div class="product-price">{{ product.price }} BYN</div>

            <div class="product-actions">
                <a href="{% url 'product_detail' product.pk %}" class="btn btn-outline">Подробнее</a>
                <a href="{% url 'add_to_cart' product.id %}" class="btn">В корзину</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

{% endblock %}
