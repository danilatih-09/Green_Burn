<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}GREEN Burn{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="C:\Users\Света\Downloads\ChatGPT Image 5 мар. 2026 г., 16_13_15.png" rel="stylesheet">

    <style>
        :root {
            --bg-main: #0f0f0f;
            --bg-secondary: #151515;
            --accent: #a3ff12;
            --text-main: #f5f5f5;
            --text-secondary: #bdbdbd;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* Animated top neon line */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: -100%;
            width: 200%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            animation: neonMove 5s linear infinite;
            z-index: 9999;
        }

        @keyframes neonMove {
            0% { transform: translateX(0); }
            100% { transform: translateX(50%); }
        }

        nav {
            position: sticky;
            top: 0;
            backdrop-filter: blur(16px);
            background: rgba(15,15,15,0.75);
            border-bottom: 1px solid rgba(163,255,18,0.1);
            z-index: 1000;
        }

        .nav-container {
            max-width: 1600px;
            margin: auto;
            padding: 24px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 4px;
            text-transform: uppercase;
            transition: 0.3s;
            cursor: pointer;
        }

        .logo:hover {
            text-shadow: 0 0 12px var(--accent);
        }

        .nav-links {
            display: flex;
            gap: 40px;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            position: relative;
            transition: 0.3s;
        }

        .nav-links a::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -6px;
            width: 0%;
            height: 2px;
            background: var(--accent);
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: var(--text-main);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .container {
            max-width: 1600px;
            margin: auto;
            padding: 120px 60px;
        }

        .btn {
            display: inline-block;
            padding: 14px 36px;
            border-radius: 40px;
            background: var(--accent);
            color: #000;
            font-weight: 600;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(163,255,18,0.6);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
        }

        .btn-outline:hover {
            background: var(--accent);
            color: #000;
        }

        .btn-danger {
            border: 1px solid #ff3b3b;
            color: #ff3b3b;
            background: transparent;
        }

        .btn-danger:hover {
            background: #ff3b3b;
            color: #000;
        }

        footer {
            padding: 80px 0;
            text-align: center;
            background: var(--bg-secondary);
            color: var(--text-secondary);
            letter-spacing: 2px;
            font-size: 14px;
        }

        @media (max-width: 1000px) {
            .nav-container { padding: 20px; }
            .container { padding: 80px 20px; }
        }
    </style>
</head>

<body>

<nav>
    <div class="nav-container">
        <div class="logo">GREEN BURN</div>
        <ul class="nav-links">
            <li><a href="{% url 'home' %}">Главная</a></li>
            <li><a href="{% url 'product_list' %}">Каталог</a></li>
            <li><a href="{% url 'cart_view' %}">Корзина</a></li>
            <li><a href="{% url 'about' %}">О магазине</a></li>
            <li><a href="/admin/">Админка</a></li>
        </ul>
    </div>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

<footer>
    © 2026 GREEN Burn — All Rights Reserved
</footer>

</body>
</html>
