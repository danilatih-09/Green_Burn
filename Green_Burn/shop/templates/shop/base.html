<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Green Burn{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
            line-height: 1.6;
        }

        /* Navigation */
        nav {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d3436 100%);
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0, 208, 132, 0.1);
            border-bottom: 2px solid #00d084;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #00d084 0%, #00cec9 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            list-style: none;
        }

        .nav-links a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 500;
            font-size: 15px;
            transition: all 0.3s ease;
            padding: 8px 16px;
            border-radius: 8px;
            position: relative;
        }

        .nav-links a::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #00d084, #00cec9);
            transition: width 0.3s ease;
        }

        .nav-links a:hover {
            color: #00d084;
            background: rgba(0, 208, 132, 0.1);
        }

        .nav-links a:hover::before {
            width: 80%;
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Buttons */
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #00d084 0%, #00b894 100%);
            color: #ffffff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 208, 132, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 208, 132, 0.5);
            background: linear-gradient(135deg, #00cec9 0%, #00d084 100%);
        }

        .btn-danger {
            background: linear-gradient(135deg, #d63031 0%, #d63031 100%);
            box-shadow: 0 4px 15px rgba(214, 48, 49, 0.3);
        }

        .btn-danger:hover {
            box-shadow: 0 6px 20px rgba(214, 48, 49, 0.5);
            background: linear-gradient(135deg, #e17055 0%, #d63031 100%);
        }

        .btn-small {
            padding: 8px 20px;
            font-size: 14px;
        }

        /* Footer */
        footer {
            background: #1a1a1a;
            border-top: 2px solid #00d084;
            padding: 30px 0;
            margin-top: 60px;
            text-align: center;
            color: #636e72;
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="logo">GREEN BURN</div>
            <ul class="nav-links">
                <li><a href="{% url 'home' %}">Главная</a></li>
                <li><a href="{% url 'product_list' %}">Каталог</a></li>
                <li><a href="{% url 'cart_view' %}">Корзина</a></li>
                <li><a href="{% url 'about' %}">О магазине</a></li>
                <li><a href="/admin/">Админка</a></li>
            </ul>
        </div>
    </nav>
    
    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <footer>
        <p>&copy; 2026 Green Burn. Все права защищены.</p>
    </footer>
</body>
</html>
